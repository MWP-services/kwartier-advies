name: Build and deploy Next.js app to Azure Web App - kwartier

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Prepare standalone deployment package
        run: |
          mkdir -p deploy/.next
          cp -R .next/standalone/. deploy/
          mkdir -p deploy/.next/static deploy/public
          cp -R .next/static/. deploy/.next/static/
          cp -R public/. deploy/public/
          node -e "const fs=require('fs'); const pkg=require('./deploy/package.json'); pkg.scripts={start:'node server.js'}; delete pkg.devDependencies; fs.writeFileSync('./deploy/package.json', JSON.stringify(pkg, null, 2));"
          cd deploy
          zip -qr ../next.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: next.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kwartier'
          slot-name: 'Production'
          package: next.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8EFE5BBAEF714E089D996EC59C7D964E }}
